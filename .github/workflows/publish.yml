name: Publish

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-distributions:
    name: Build Python distributions
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Verify release tag matches project version
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          python - <<'PY'
          import os
          import tomllib
          from pathlib import Path

          payload = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          version = str(payload["project"]["version"]).strip()
          expected_tag = f"v{version}"
          actual_tag = str(os.environ["GITHUB_REF_NAME"]).strip()
          if actual_tag != expected_tag:
              raise SystemExit(
                  f"Release tag {actual_tag!r} does not match project.version {expected_tag!r}"
              )
          print(f"Release tag matches project.version: {actual_tag}")
          PY

      - name: Build distribution artifacts
        run: uv build

      - name: Check distribution metadata
        run: uvx twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/*

      - name: Attach artifacts to GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*

  publish-to-testpypi:
    name: Publish Python distributions to TestPyPI
    if: github.event_name == 'workflow_dispatch'
    needs:
      - build-distributions
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/afkbotio
    permissions:
      id-token: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-to-pypi:
    name: Publish Python distributions to PyPI
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - build-distributions
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/afkbotio/
    permissions:
      id-token: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
