name: Bug report
description: Report a reproducible problem in AFKBOT
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem. Please remove secrets, tokens, and private URLs before submitting.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
      placeholder: Describe the failure in one or two sentences.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: List the exact steps to reproduce the issue.
      placeholder: |
        1. Run ...
        2. Configure ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened instead?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or output
      description: Paste sanitized output, stack traces, or screenshots if available.
      render: shell

  - type: input
    id: version
    attributes:
      label: AFKBOT version
      placeholder: "1.0.0"

  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: "macOS 14, Python 3.12"
