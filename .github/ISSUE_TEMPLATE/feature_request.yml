name: Feature request
description: Suggest an improvement for AFKBOT
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Describe the user problem first, then the proposed change.

  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What user or operator problem does this solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What behavior, command, or workflow should change?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: List workarounds or other approaches if you have them.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add links, examples, screenshots, or constraints that matter.
